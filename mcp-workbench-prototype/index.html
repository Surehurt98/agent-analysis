<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP 工程化治理工作台</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/modules/overview.css">
    <link rel="stylesheet" href="css/modules/schema.css">
    <link rel="stylesheet" href="css/modules/protocol.css">
    <link rel="stylesheet" href="css/modules/testing.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.hidden {
            display: none;
        }

        .modal {
            background: var(--color-bg-surface);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            width: 500px;
            max-width: 90%;
            box-shadow: var(--shadow-md);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-md);
        }

        .modal-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: var(--color-bg-surface-hover);
        }

        .modal-body {
            margin-bottom: var(--space-lg);
        }

        .modal-footer {
            display: flex;
            gap: var(--space-sm);
            justify-content: flex-end;
        }

        .modal-checklist {
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
        }

        .modal-check-item {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: var(--space-sm) var(--space-md);
            background: var(--color-bg-app);
            border-radius: var(--radius-sm);
        }

        .modal-check-item .check-info {
            flex: 1;
        }

        .modal-check-item .check-label {
            font-weight: 500;
            font-size: 0.9rem;
        }

        .modal-check-item .check-detail {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <div class="app-shell">
        <!-- System Navigation (Level 1) -->
        <nav class="system-nav">
            <div class="nav-brand">
                <span class="icon material-icons-round">hub</span>
                <span class="brand-text">MCP 工作台</span>
            </div>
            <div class="nav-links">
                <a href="#" class="nav-item active">MCP 工具</a>
                <a href="#" class="nav-item">API 工具</a>
                <a href="#" class="nav-item">我的工作区</a>
            </div>
            <div class="nav-user">
                <div class="avatar">AG</div>
            </div>
        </nav>

        <!-- Main Workspace -->
        <main class="workspace">
            <header class="workspace-header">
                <div class="breadcrumbs">
                    <span class="crumb">MCP 工具</span>
                    <span class="separator">/</span>
                    <span class="crumb active">weather-service-mcp</span>
                </div>
            </header>

            <!-- Overview Section -->
            <section id="overview-area" class="overview-area"></section>

            <!-- Level 2 Navigation (Tabs) - No Basic Info Tab -->
            <div class="tabs-container">
                <nav class="tabs-nav" id="main-tabs">
                    <button class="tab-btn active" data-tab="schema">
                        <span class="material-icons-round">data_object</span>
                        Schema 定义
                    </button>
                    <button class="tab-btn" data-tab="protocol">
                        <span class="material-icons-round">swap_horiz</span>
                        协议转换
                    </button>
                    <button class="tab-btn" data-tab="interface-test">
                        <span class="material-icons-round">science</span>
                        接口测试
                    </button>
                    <button class="tab-btn" data-tab="affinity-test">
                        <span class="material-icons-round">psychology</span>
                        AI 亲和性
                    </button>
                </nav>

                <div class="tab-content-area" id="tab-panels">
                    <div class="tab-panel active" id="panel-schema"></div>
                    <div class="tab-panel" id="panel-protocol"></div>
                    <div class="tab-panel" id="panel-interface-test"></div>
                    <div class="tab-panel" id="panel-affinity-test"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Publish Check Modal -->
    <div class="modal-overlay hidden" id="publish-modal">
        <div class="modal">
            <div class="modal-header">
                <h3>发布检查</h3>
                <button class="modal-close" id="modal-close"><span class="material-icons-round">close</span></button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom:var(--space-md); color:var(--text-secondary);">请确认以下检查项均已通过后再发布：</p>
                <div class="modal-checklist" id="modal-checklist"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="modal-cancel">取消</button>
                <button class="btn btn-primary" id="modal-confirm" disabled>确认发布</button>
            </div>
        </div>
    </div>

    <!-- Interface Test Case Modal -->
    <div class="modal-overlay hidden" id="interface-case-modal">
        <div class="modal" style="width:600px;">
            <div class="modal-header">
                <h3 id="interface-modal-title">新增接口测试用例</h3>
                <button class="modal-close"
                    onclick="document.getElementById('interface-case-modal').classList.add('hidden')"><span
                        class="material-icons-round">close</span></button>
            </div>
            <div class="modal-body">
                <div class="form-grid">
                    <div class="input-group">
                        <label class="input-label">用例名称 *</label>
                        <input type="text" class="input-control" id="if-case-name" placeholder="请输入用例名称">
                    </div>
                    <div class="form-row">
                        <div class="input-group">
                            <label class="input-label">用例分类 *</label>
                            <select class="input-control" id="if-case-category">
                                <option>功能测试</option>
                                <option>异常测试</option>
                                <option>安全测试</option>
                                <option>性能测试</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label class="input-label">所属测试集 *</label>
                            <select class="input-control" id="if-case-suite">
                                <option>冒烟测试</option>
                                <option>边界测试</option>
                                <option>安全测试</option>
                                <option>国际化测试</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="input-group">
                            <label class="input-label">执行环境 *</label>
                            <select class="input-control" id="if-case-env">
                                <option value="test">Test 环境</option>
                                <option value="prod">Prod 环境</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label class="input-label">预设结果</label>
                            <select class="input-control" id="if-case-status">
                                <option value="PENDING">待执行</option>
                                <option value="PASS">通过</option>
                                <option value="FAIL">失败</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">预期结果 *</label>
                        <textarea class="input-control" id="if-case-expected" rows="2" placeholder="请描述预期结果"></textarea>
                    </div>
                    <div class="input-group">
                        <label class="input-label">请求参数 (JSON)</label>
                        <textarea class="input-control" id="if-case-params" rows="3"
                            placeholder='{"city": "北京"}'></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary"
                    onclick="document.getElementById('interface-case-modal').classList.add('hidden')">取消</button>
                <button class="btn btn-primary"
                    onclick="alert('用例已保存（模拟）'); document.getElementById('interface-case-modal').classList.add('hidden')">保存</button>
            </div>
        </div>
    </div>

    <!-- Affinity Test Case Modal -->
    <div class="modal-overlay hidden" id="affinity-case-modal">
        <div class="modal" style="width:600px;">
            <div class="modal-header">
                <h3 id="affinity-modal-title">新增 AI 亲和性用例</h3>
                <button class="modal-close"
                    onclick="document.getElementById('affinity-case-modal').classList.add('hidden')"><span
                        class="material-icons-round">close</span></button>
            </div>
            <div class="modal-body">
                <div class="form-grid">
                    <div class="input-group">
                        <label class="input-label">用例名称 *</label>
                        <input type="text" class="input-control" id="af-case-name" placeholder="请输入用例名称">
                    </div>
                    <div class="input-group">
                        <label class="input-label">Prompt (提示词) *</label>
                        <textarea class="input-control" id="af-case-prompt" rows="2"
                            placeholder="请输入自然语言指令，如：北京今天天气怎么样？"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="input-group">
                            <label class="input-label">用例分类 *</label>
                            <select class="input-control" id="af-case-category">
                                <option>基础场景</option>
                                <option>复杂场景</option>
                                <option>边界场景</option>
                                <option>负向测试</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label class="input-label">所属测试集 *</label>
                            <select class="input-control" id="af-case-suite">
                                <option>核心用例</option>
                                <option>扩展用例</option>
                                <option>边界用例</option>
                                <option>负向用例</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="input-group">
                            <label class="input-label">期望命中</label>
                            <select class="input-control" id="af-case-hit">
                                <option value="true">是 - 应命中此 MCP</option>
                                <option value="false">否 - 不应命中此 MCP</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label class="input-label">期望最低得分</label>
                            <select class="input-control" id="af-case-score">
                                <option value="4.5">优秀 (≥4.5)</option>
                                <option value="3.5">良好 (≥3.5)</option>
                                <option value="0">无要求</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">预期结果 *</label>
                        <textarea class="input-control" id="af-case-expected" rows="2" placeholder="请描述预期结果"></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary"
                    onclick="document.getElementById('affinity-case-modal').classList.add('hidden')">取消</button>
                <button class="btn btn-primary"
                    onclick="alert('用例已保存（模拟）'); document.getElementById('affinity-case-modal').classList.add('hidden')">保存</button>
            </div>
        </div>
    </div>

    <!-- All Scripts Inline -->
    <script>
        // ============ DATA ============
        const MCP_TOOL = {
            id: "mcp-weather-v1",
            name: "weather-service-mcp",
            nameCN: "天气查询服务",
            nameEN: "Weather Query Service",

            descriptionEN: "Provides weather forecast and disaster alert services.",
            version: "1.2.0",
            category1: "数据查询",
            category2: "天气/环境",
            status: "DRAFT",
            team: "AI平台-工具中台",
            source: "API导入",
            checklist: {
                schema: { status: "PASS", message: "Schema 完整性校验通过", detail: "Input/Output 字段结构完整", link: "schema" },

                interfaceTest: { status: "FAIL", message: "接口测试未通过", detail: "最近批量: 13/15 通过 (86.7%)", link: "interface-test" },
                affinityTest: { status: "PASS", message: "AI 亲和性良好", detail: "平均分 4.8/5.0，命中率 96%", link: "affinity-test" }
            },
            owners: [
                { name: "张三", avatar: "张", role: "负责人" },
                { name: "李四", avatar: "李", role: "协作人" }
            ],
            createdAt: "2023-09-15T08:00:00Z",
            lastUpdated: "2023-10-27T10:30:00Z",
            createdBy: "张三",
            stats: { totalCalls: 15420, avgLatency: 120, errorRate: 0.3 }
        };

        // Version history data
        const VERSION_HISTORY = [
            { version: "1.2.0", status: "DRAFT", date: "2023-10-27", isCurrent: true },
            { version: "1.1.0", status: "PUBLISHED", date: "2023-10-15", isCurrent: false },
            { version: "1.0.0", status: "PUBLISHED", date: "2023-09-20", isCurrent: false }
        ];

        const INTERFACE_TEST_CASES = [
            { id: "TC-001", name: "获取北京天气 (正常)", category: "功能测试", testSuite: "冒烟测试", expectedResult: "返回完整天气数据", env: "test", status: "PASS", latency: 98, lastRun: "2分钟前" },
            { id: "TC-002", name: "获取上海天气 (正常)", category: "功能测试", testSuite: "冒烟测试", expectedResult: "返回完整天气数据", env: "test", status: "PASS", latency: 112, lastRun: "2分钟前" },
            { id: "TC-003", name: "缺少必填参数 city", category: "异常测试", testSuite: "边界测试", expectedResult: "返回400错误码", env: "test", status: "FAIL", latency: 45, lastRun: "2分钟前" },
            { id: "TC-004", name: "无效 API Key", category: "安全测试", testSuite: "安全测试", expectedResult: "返回401认证失败", env: "test", status: "FAIL", latency: 30, lastRun: "2分钟前" },
            { id: "TC-005", name: "获取东京天气 (边界)", category: "功能测试", testSuite: "国际化测试", expectedResult: "正确返回非中文城市数据", env: "prod", status: "PASS", latency: 156, lastRun: "5分钟前" }
        ];

        const INTERFACE_TEST_HISTORY = [
            { runId: "RUN-20231027-001", trigger: "手动执行", caseCount: 15, successRate: 86.7, avgLatency: 105, startTime: "2023-10-27 10:25:00", user: "张三" },
            { runId: "RUN-20231026-002", trigger: "发布前校验", caseCount: 15, successRate: 100, avgLatency: 98, startTime: "2023-10-26 16:30:00", user: "System" }
        ];

        const AFFINITY_TEST_CASES = [
            { id: "AC-001", name: "基础天气查询", prompt: "北京今天天气怎么样？", category: "基础场景", testSuite: "核心用例", expectedResult: "正确识别城市和时间参数", hit: true, status: "PASS", score: 5.0, paramFill: 100, callSuccess: true },
            { id: "AC-002", name: "出行建议场景", prompt: "我明天去上海出差，需要带伞吗？", category: "复杂场景", testSuite: "核心用例", expectedResult: "识别城市、时间和需求意图", hit: true, status: "PASS", score: 4.8, paramFill: 100, callSuccess: true },
            { id: "AC-003", name: "多日查询场景", prompt: "帮我查一下未来三天深圳的温度变化趋势", category: "复杂场景", testSuite: "扩展用例", expectedResult: "识别多日查询意图", hit: true, status: "PASS", score: 4.5, paramFill: 80, callSuccess: true },
            { id: "AC-004", name: "无关问题过滤", prompt: "给我讲个笑话", category: "负向测试", testSuite: "负向用例", expectedResult: "不应命中天气MCP", hit: false, status: "PASS", score: 5.0, paramFill: 0, callSuccess: false },
            { id: "AC-005", name: "模糊查询处理", prompt: "天气预报", category: "边界场景", testSuite: "边界用例", expectedResult: "提示缺少城市参数", hit: true, status: "WARN", score: 3.5, paramFill: 50, callSuccess: true }
        ];

        const AFFINITY_TEST_HISTORY = [
            { runId: "AF-20231027-001", llmVersion: "GPT-4-Turbo", caseCount: 20, avgScore: 4.8, hitRate: 96, rounds: 3, startTime: "2023-10-27 10:00:00", user: "张三" }
        ];

        // ============ APP STATE ============
        let appState = {
            mcp: { ...MCP_TOOL },
            currentTab: 'schema'
        };

        // Helper: Check if all checklist items pass
        function isAllChecklistPassed(checklist) {
            return Object.values(checklist).every(item => item.status === 'PASS');
        }

        // ============ OVERVIEW MODULE ============
        function renderOverview(container, mcpData) {
            const getStatusBadge = (status) => {
                const map = {
                    'DRAFT': { class: 'badge-draft', label: '草稿' },
                    'VALIDATING': { class: 'badge-validating', label: '校验中' },
                    'READY': { class: 'badge-ready', label: '可发布' },
                    'PUBLISHED': { class: 'badge-published', label: '已发布' },
                    'OFFLINE': { class: 'badge-offline', label: '已下线' },
                    'PUBLISH_FAILED': { class: 'badge-error', label: '发布失败' }

                return map[status] || map['DRAFT'];
            };

            const statusInfo = getStatusBadge(mcpData.status);

            container.innerHTML = `
            <div class="overview-grid">
                <!-- Left Card: Tool Info & Basic Info Form -->
                <div class="card overview-main">
                    <div class="overview-header">
                        <div class="tool-identity">
                            <div class="tool-icon"><span class="material-icons-round">cloud</span></div>
                            <div>
                                <h1 class="tool-name">${mcpData.nameCN || mcpData.name}</h1>
                                <div class="tool-meta">
                                    <span class="version">v${mcpData.version}</span>
                                    <span class="badge badge-lg ${statusInfo.class}">${statusInfo.label}</span>
                                </div>
                            </div>
                        </div>
                        <!-- Version Dropdown -->
                        <div class="version-dropdown" id="version-dropdown">
                            <button class="btn btn-secondary version-trigger" id="version-trigger">
                                <span class="material-icons-round">history</span>
                                <span>版本: v${mcpData.version}</span>
                                <span class="material-icons-round">expand_more</span>
                            </button>
                            <div class="version-menu hidden" id="version-menu">
                                ${VERSION_HISTORY.map(v => `
                                    <div class="version-option ${v.isCurrent ? 'current' : ''}" data-version="${v.version}">
                                        <div class="version-info">
                                            <span class="version-num">v${v.version}</span>
                                            <span class="badge ${v.status === 'PUBLISHED' ? 'badge-published' : 'badge-draft'}">${v.status === 'PUBLISHED' ? '已发布' : '草稿'}</span>
                                        </div>
                                        <span class="version-date">${v.date}</span>
                                        ${v.status === 'DRAFT' && !v.isCurrent ? `<button class="version-delete" data-version="${v.version}" title="删除此版本"><span class="material-icons-round">delete</span></button>` : ''}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                    
                    <!-- Basic Info Form (Replacing Checklist) -->
                    <div class="basic-info-inline">
                        <div class="form-row">
                            <div class="input-group">
                                <label class="input-label">工具标识 (ID)</label>
                                <input type="text" class="input-control" value="${mcpData.id}" disabled style="background:var(--color-bg-app);">
                            </div>
                            <div class="input-group">
                                <label class="input-label">MCP 分类 *</label>
                                <select class="input-control">
                                    <option ${mcpData.category1 === '数据查询' ? 'selected' : ''}>数据查询</option>
                                    <option>内容生成</option>
                                    <option>系统操作</option>
                                    <option>通讯协作</option>
                                    <option>开发工具</option>
                                    <option>天气/环境</option>
                                    <option>金融/股票</option>
                                    <option>地图/位置</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="input-group">
                                <label class="input-label">工具名称 (中文) *</label>
                                <input type="text" class="input-control" value="${mcpData.nameCN}" placeholder="请输入中文名称">
                            </div>
                            <div class="input-group">
                                <label class="input-label">工具名称 (英文) *</label>
                                <input type="text" class="input-control" value="${mcpData.nameEN}" placeholder="Enter English name">
                            </div>
                        </div>
                        <div class="input-group">
                            <label class="input-label">工具描述 (中文) *</label>
                            <textarea class="input-control" rows="4" placeholder="请输入中文描述">${mcpData.descriptionCN}</textarea>
                        </div>
                        <div class="input-group">
                            <label class="input-label">工具描述 (英文)</label>
                            <textarea class="input-control" rows="4" placeholder="Enter English description">${mcpData.descriptionEN}</textarea>
                        </div>
                    </div>

                    <!-- Stats Summary -->
                    <div class="status-summary">
                        <div class="summary-item"><span class="material-icons-round">api</span><span>总调用量: <strong>${mcpData.stats?.totalCalls?.toLocaleString() || 'N/A'}</strong></span></div>
                        <div class="summary-item"><span class="material-icons-round">timer</span><span>平均延迟: <strong>${mcpData.stats?.avgLatency || 'N/A'}ms</strong></span></div>
                        <div class="summary-item"><span class="material-icons-round">error_outline</span><span>错误率: <strong>${mcpData.stats?.errorRate || 'N/A'}%</strong></span></div>
                    </div>
                </div>
                
                <!-- Right Card: Governance -->
                <div class="card overview-side">
                    <h3 class="section-title">治理信息</h3>
                    <div class="gov-item">
                        <label>负责人 / 协作人</label>

            if (publishBtn) {

            if (deleteBtn) {

                });

            if (saveBtn) {
                saveBtn.addEventListener('click', () => {

                    setTimeout(() => {
                        saveBtn.innerHTML = '<span class="material-icons-round">check</span> 已保存';
                        setTimeout(() => {
                            saveBtn.innerHTML = '<span class="material-icons-round">save</span> 保存草稿';
                        }, 2000);
                    }, 500);
                });
            }

            // Owner management - Remove
            container.querySelectorAll('.chip-remove').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = parseInt(btn.dataset.idx);
                    const owner = appState.mcp.owners[idx];
                    if (owner.role === '负责人' && appState.mcp.owners.length > 1) {
                        if (!confirm('确定移除负责人？负责人职责将由第一个协作人接管。')) return;
                        appState.mcp.owners.splice(idx, 1);
                        if (appState.mcp.owners.length > 0) {
                            appState.mcp.owners[0].role = '负责人';
                        }
                    } else if (appState.mcp.owners.length === 1) {
                        alert('至少需要保留一名负责人');
                        return;
                    } else {
                        appState.mcp.owners.splice(idx, 1);
                    }
                    renderOverview(container, appState.mcp);
                });
            });

            // Owner management - Add
            const addOwnerBtn = container.querySelector('#btn-add-owner');
            if (addOwnerBtn) {
                addOwnerBtn.addEventListener('click', () => {
                    const name = prompt('请输入新成员姓名：');
                    if (name && name.trim()) {
                        const role = appState.mcp.owners.length === 0 ? '负责人' : '协作人';
                        appState.mcp.owners.push({
                            name: name.trim(),
                            avatar: name.trim().charAt(0),
                            role: role
                        });
                        renderOverview(container, appState.mcp);
                    }
                });
            }

            // Version Dropdown Toggle
            const versionTrigger = container.querySelector('#version-trigger');
            const versionMenu = container.querySelector('#version-menu');
            if (versionTrigger && versionMenu) {
                versionTrigger.addEventListener('click', (e) => {
                    e.stopPropagation();
                    versionMenu.classList.toggle('hidden');
                });

                // Close on click outside
                document.addEventListener('click', () => {
                    versionMenu.classList.add('hidden');
                });

                versionMenu.addEventListener('click', (e) => {
                    e.stopPropagation();
                });

                // Version option click (switch version)
                container.querySelectorAll('.version-option').forEach(opt => {
                    opt.addEventListener('click', () => {
                        const ver = opt.dataset.version;
                        alert(`切换到版本 v${ver} (模拟)`);
                        versionMenu.classList.add('hidden');
                    });
                });

                // Delete draft version
                container.querySelectorAll('.version-delete').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const ver = btn.dataset.version;
                        if (confirm(`确认删除草稿版本 v${ver}？此操作不可撤销。`)) {

                                renderOverview(container, appState.mcp);
                            }
                            alert(`版本 v${ver} 已删除`);
                        }
                    });
                });
            }
        }

        // ============ PUBLISH MODAL ============
        function showPublishModal() {
            const modal = document.getElementById('publish-modal');
            const checklistContainer = document.getElementById('modal-checklist');
            const confirmBtn = document.getElementById('modal-confirm');

            // Render first 4 checklist items (no manual review)
            const checklist = appState.mcp.checklist;
            const items = [
                { key: 'schema', label: 'Schema 完整性' },
                { key: 'protocol', label: '协议转换配置' },
                { key: 'interfaceTest', label: '接口测试' },
                { key: 'affinityTest', label: 'AI 亲和性' }
            ];

            const iconMap = {
                'PASS': { icon: 'check_circle', class: 'pass' },
                'FAIL': { icon: 'cancel', class: 'fail' },
                'WARN': { icon: 'warning', class: 'warn' },
                'PENDING': { icon: 'schedule', class: 'pending' }
            };

            checklistContainer.innerHTML = items.map(item => {
                const check = checklist[item.key];
                const st = iconMap[check.status] || iconMap['PENDING'];
                return `
                <div class="modal-check-item">
                    <span class="material-icons-round status-icon ${st.class}">${st.icon}</span>
                    <div class="check-info">
                        <div class="check-label">${item.label}</div>
                        <div class="check-detail">${check.message}</div>
                    </div>
                </div>
            `;
            }).join('');

            // Check if all 4 items pass
            const allPass = items.every(item => checklist[item.key].status === 'PASS');
            confirmBtn.disabled = !allPass;

            modal.classList.remove('hidden');
        }

        function hidePublishModal() {
            document.getElementById('publish-modal').classList.add('hidden');
        }

        // Modal event bindings
        document.getElementById('modal-close').addEventListener('click', hidePublishModal);
        document.getElementById('modal-cancel').addEventListener('click', hidePublishModal);
        document.getElementById('modal-confirm').addEventListener('click', () => {
            appState.mcp.status = 'PUBLISHED';
            renderOverview(document.getElementById('overview-area'), appState.mcp);
            hidePublishModal();
            alert('发布成功！');

                        document.getElementById('interface-modal-title').textContent = '新增接口测试用例';
                        document.getElementById('if-case-name').value = '';
                        document.getElementById('if-case-expected').value = '';
                        document.getElementById('if-case-params').value = '';
                        document.getElementById('interface-case-modal').classList.remove('hidden');
                    });
                }

                const editInterfaceCaseBtn = container.querySelector('#btn-edit-interface-case');
                if (editInterfaceCaseBtn) {
                    editInterfaceCaseBtn.addEventListener('click', () => {
                        const selectedCase = cases[0]; // Use first case as example
                        document.getElementById('interface-modal-title').textContent = '编辑接口测试用例';
                        document.getElementById('if-case-name').value = selectedCase.name;
                        document.getElementById('if-case-expected').value = selectedCase.expectedResult;
                        document.getElementById('if-case-params').value = '{"city": "北京"}';
                        document.getElementById('interface-case-modal').classList.remove('hidden');
                    });
                }
            };
            render();
        }

        // ============ AFFINITY TEST MODULE ============
        function renderAffinityTest(container) {
            let currentSubTab = 'debug';

            const render = () => {
                let panelContent = '';
                if (currentSubTab === 'debug') {
                    panelContent = `
                    <div class="affinity-debug">
                        <div class="prompt-input card">
                            <h4>输入自然语言指令</h4>
                            <textarea class="input-control prompt-textarea" placeholder="例如：帮我查一下明天上海的天气预报"></textarea>
                            <div class="prompt-actions">
                                <select class="input-control" style="width:180px;"><option>GPT-4-Turbo</option><option>GPT-4</option><option>Claude-3</option></select>
                                <button class="btn btn-primary"><span class="material-icons-round">send</span> 测试亲和性</button>
                            </div>
                        </div>
                        <div class="affinity-result card">
                            <h4>评测结果</h4>
                            <div class="result-grid">
                                <div class="result-item"><label>是否命中 MCP</label><div class="result-value hit"><span class="material-icons-round">check_circle</span> 是</div></div>
                                <div class="result-item"><label>生成的 MCP Input</label><pre class="result-code">{ "city": "上海", "date": "tomorrow" }</pre></div>
                                <div class="result-item"><label>参数完整率</label><div class="result-value"><div class="mini-progress"><div class="mini-fill" style="width:80%"></div></div><span>80%</span></div></div>
                                <div class="result-item"><label>综合评分</label><div class="result-value score"><span class="score-num">4.5</span> / 5.0</div></div>
                            </div>
                        </div>
                    </div>
                `;
                } else if (currentSubTab === 'cases') {
                    const selectedCase = AFFINITY_TEST_CASES[0]; // Default to first case
                    panelContent = `
                    <div class="cases-panel with-detail">
                        <div class="cases-list">
                            <div class="toolbar">
                                <div class="toolbar-left">
                                    <input type="text" class="input-control" placeholder="搜索用例..." style="width:140px;">
                                    <select class="input-control" style="width:100px;"><option value="">所有分类</option><option>基础场景</option><option>复杂场景</option><option>边界场景</option><option>负向测试</option></select>
                                    <select class="input-control" style="width:100px;"><option value="">所有测试集</option><option>核心用例</option><option>扩展用例</option><option>边界用例</option><option>负向用例</option></select>
                                    <select class="input-control" style="width:90px;"><option value="">命中状态</option><option>命中</option><option>未命中</option></select>
                                    <select class="input-control" style="width:90px;"><option value="">所有结果</option><option>PASS</option><option>WARN</option><option>FAIL</option></select>
                                </div>
                                <div class="toolbar-right">
                                    <button class="btn btn-secondary" title="批量导入"><span class="material-icons-round">upload_file</span> 导入</button>
                                    <button class="btn btn-secondary" title="批量导出"><span class="material-icons-round">download</span> 导出</button>
                                    <button class="btn btn-primary" id="btn-add-affinity-case"><span class="material-icons-round">add</span> 新增用例</button>
                                </div>
                            </div>
                            <div class="card" style="padding:0; overflow:hidden;">
                                <table class="data-table selectable" id="affinity-cases-table">
                                    <thead><tr><th style="width:40px;"><input type="checkbox"></th><th>ID</th><th>用例名称</th><th>分类</th><th>命中?</th><th>得分</th></tr></thead>
                                    <tbody>
                                        ${AFFINITY_TEST_CASES.map((c, idx) => `
                                            <tr class="case-row ${idx === 0 ? 'selected' : ''}" data-idx="${idx}">
                                                <td><input type="checkbox"></td>
                                                <td><code>${c.id}</code></td>
                                                <td style="font-weight:500;">${c.name}</td>
                                                <td><span class="badge badge-draft">${c.category}</span></td>
                                                <td>${c.hit ? '<span class="badge badge-ready">是</span>' : '<span class="badge badge-offline">否</span>'}</td>
                                                <td><span class="score-badge ${c.score >= 4.5 ? 'good' : c.score >= 3.5 ? 'warn' : 'bad'}">${c.score}</span></td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        <div class="case-detail card" id="affinity-case-detail">
                            <h4>用例详情</h4>
                            <div class="detail-content">
                                <div class="detail-item"><label>用例名称</label><div class="val">${selectedCase.name}</div></div>
                                <div class="detail-item"><label>Prompt</label><div class="val" style="font-style:italic;">"${selectedCase.prompt}"</div></div>
                                <div class="detail-item"><label>用例分类</label><div class="val"><span class="badge badge-draft">${selectedCase.category}</span></div></div>
                                <div class="detail-item"><label>所属测试集</label><div class="val">${selectedCase.testSuite}</div></div>
                                <div class="detail-item"><label>预期结果</label><div class="val">${selectedCase.expectedResult}</div></div>
                                <div class="detail-item"><label>评分</label><div class="val"><span class="score-badge ${selectedCase.score >= 4.5 ? 'good' : selectedCase.score >= 3.5 ? 'warn' : 'bad'}">${selectedCase.score}</span></div></div>
                            </div>
                            <div class="detail-actions">
                                <button class="btn btn-secondary" id="btn-edit-affinity-case"><span class="material-icons-round">edit</span> 编辑</button>
                                <button class="btn btn-danger"><span class="material-icons-round">delete</span> 删除</button>
                            </div>
                        </div>
                    </div>
                `;
                } else if (currentSubTab === 'batch') {
                    panelContent = `
                    <div class="batch-panel">
                        <div class="batch-config card">
                            <h4>批量评测配置</h4>
                            <div class="config-grid">
                                <div class="input-group"><label class="input-label">选择用例集</label><select class="input-control"><option>全部用例 (${AFFINITY_TEST_CASES.length})</option></select></div>
                                <div class="input-group"><label class="input-label">LLM 版本</label><select class="input-control"><option>GPT-4-Turbo</option><option>GPT-4</option></select></div>
                                <div class="input-group"><label class="input-label">执行轮次</label><select class="input-control"><option>1 轮</option><option>3 轮 (推荐)</option></select></div>
                            </div>
                            <div class="batch-actions"><button class="btn btn-primary btn-lg"><span class="material-icons-round">psychology</span> 开始批量评测</button></div>
                        </div>
                        <div class="stats-preview">
                            <div class="stat-card card"><div class="stat-label">平均得分</div><div class="stat-value primary">4.8 <small>/ 5.0</small></div></div>
                            <div class="stat-card card"><div class="stat-label">命中率</div><div class="stat-value success">96%</div></div>
                            <div class="stat-card card"><div class="stat-label">参数完整率</div><div class="stat-value">88%</div></div>
                            <div class="stat-card card"><div class="stat-label">调用成功率</div><div class="stat-value success">100%</div></div>
                        </div>
                    </div>
                `;
                } else if (currentSubTab === 'history') {
                    panelContent = `
                    <div class="history-panel">
                        <div class="card" style="padding:0; overflow:hidden;">
                            <table class="data-table">
                                <thead><tr><th>执行 ID</th><th>LLM 版本</th><th>用例数</th><th>平均分</th><th>命中率</th><th>执行时间</th><th>操作</th></tr></thead>
                                <tbody>
                                    ${AFFINITY_TEST_HISTORY.map(h => `
                                        <tr>
                                            <td><code>${h.runId}</code></td>
                                            <td>${h.llmVersion}</td>
                                            <td>${h.caseCount}</td>
                                            <td><span class="score-badge good">${h.avgScore}</span></td>
                                            <td>${h.hitRate}%</td>
                                            <td>${h.startTime}</td>
                                            <td><button class="btn btn-ghost btn-sm"><span class="material-icons-round">description</span></button></td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
                }

                container.innerHTML = `
                <div class="module-container">
                    <div class="sub-tabs">
                        <button class="sub-tab ${currentSubTab === 'debug' ? 'active' : ''}" data-subtab="debug"><span class="material-icons-round">chat</span> 单句调试</button>
                        <button class="sub-tab ${currentSubTab === 'cases' ? 'active' : ''}" data-subtab="cases"><span class="material-icons-round">list_alt</span> 测试用例</button>
                        <button class="sub-tab ${currentSubTab === 'batch' ? 'active' : ''}" data-subtab="batch"><span class="material-icons-round">psychology</span> 批量评测</button>
                        <button class="sub-tab ${currentSubTab === 'history' ? 'active' : ''}" data-subtab="history"><span class="material-icons-round">history</span> 历史报告</button>
                    </div>
                    <div class="sub-panel">${panelContent}</div>
                </div>
            `;

                container.querySelectorAll('.sub-tab').forEach(tab => {
                    tab.addEventListener('click', () => { currentSubTab = tab.dataset.subtab; render(); });
                });

                // Affinity Test Modal Triggers
                const addAffinityCaseBtn = container.querySelector('#btn-add-affinity-case');
                if (addAffinityCaseBtn) {
                    addAffinityCaseBtn.addEventListener('click', () => {
                        document.getElementById('affinity-modal-title').textContent = '新增 AI 亲和性用例';
                        document.getElementById('af-case-name').value = '';
                        document.getElementById('af-case-prompt').value = '';
                        document.getElementById('af-case-expected').value = '';
                        document.getElementById('affinity-case-modal').classList.remove('hidden');
                    });
                }

                const editAffinityCaseBtn = container.querySelector('#btn-edit-affinity-case');
                if (editAffinityCaseBtn) {
                    editAffinityCaseBtn.addEventListener('click', () => {
                        const selectedCase = AFFINITY_TEST_CASES[0]; // Use first case as example
                        document.getElementById('affinity-modal-title').textContent = '编辑 AI 亲和性用例';
                        document.getElementById('af-case-name').value = selectedCase.name;
                        document.getElementById('af-case-prompt').value = selectedCase.prompt;
                        document.getElementById('af-case-expected').value = selectedCase.expectedResult;
                        document.getElementById('affinity-case-modal').classList.remove('hidden');
                    });
                }
            };
            render();
        }

        // ============ APP INIT ============
        document.addEventListener('DOMContentLoaded', () => {
            // Render Overview
            renderOverview(document.getElementById('overview-area'), appState.mcp);

            // Render default tab (Schema)
            renderSchema(document.getElementById('panel-schema'));

            // Tab switching
            document.querySelectorAll('.tab-btn').forEach(tab => {
                tab.addEventListener('click', () => {
                    const target = tab.dataset.tab;

                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));

                    tab.classList.add('active');
                    document.getElementById(`panel-${target}`).classList.add('active');

                    const panel = document.getElementById(`panel-${target}`);
                    if (panel.childElementCount === 0) {
                        switch (target) {
                            case 'schema': renderSchema(panel); break;
                            case 'protocol': renderProtocol(panel); break;
                            case 'interface-test': renderInterfaceTest(panel); break;
                            case 'affinity-test': renderAffinityTest(panel); break;
                        }
                    }
                });
            });
        });
    </script>
</body>

</html>
