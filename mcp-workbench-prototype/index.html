<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP 工程化治理工作台</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/modules/overview.css">
    <link rel="stylesheet" href="css/modules/schema.css">
    <link rel="stylesheet" href="css/modules/protocol.css">
    <link rel="stylesheet" href="css/modules/testing.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.hidden {
            display: none;
        }

        .modal {
            background: var(--color-bg-surface);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            width: 500px;
            max-width: 90%;
            box-shadow: var(--shadow-md);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-md);
        }

        .modal-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: var(--color-bg-surface-hover);
        }

        .modal-body {
            margin-bottom: var(--space-lg);
        }

        .modal-footer {
            display: flex;
            gap: var(--space-sm);
            justify-content: flex-end;
        }

        .modal-checklist {
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
        }

        .modal-check-item {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: var(--space-sm) var(--space-md);
            background: var(--color-bg-app);
            border-radius: var(--radius-sm);
        }

        .modal-check-item .check-info {
            flex: 1;
        }

        .modal-check-item .check-label {
            font-weight: 500;
            font-size: 0.9rem;
        }

        .modal-check-item .check-detail {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <div class="app-shell">
        <!-- System Navigation (Level 1) -->
        <nav class="system-nav">
            <div class="nav-brand">
                <span class="icon material-icons-round">hub</span>
                <span class="brand-text">MCP 工作台</span>
            </div>
            <div class="nav-links">
                <a href="#" class="nav-item active">MCP 工具</a>
                <a href="#" class="nav-item">API 工具</a>
                <a href="#" class="nav-item">我的工作区</a>
            </div>
            <div class="nav-user">
                <div class="avatar">AG</div>
            </div>
        </nav>

        <!-- Main Workspace -->
        <main class="workspace">
            <header class="workspace-header">
                <div class="breadcrumbs">
                    <span class="crumb">MCP 工具</span>
                    <span class="separator">/</span>
                    <span class="crumb active">weather-service-mcp</span>
                </div>
            </header>

            <!-- Overview Section -->
            <section id="overview-area" class="overview-area"></section>

            <!-- Level 2 Navigation (Tabs) - No Basic Info Tab -->
            <div class="tabs-container">
                <nav class="tabs-nav" id="main-tabs">
                    <button class="tab-btn active" data-tab="basic-info">
                        <span class="material-icons-round">info</span>
                        基本信息
                    </button>
                    <button class="tab-btn" data-tab="schema">
                        <span class="material-icons-round">data_object</span>
                        Schema 定义
                    </button>
                    <button class="tab-btn" data-tab="protocol">
                        <span class="material-icons-round">swap_horiz</span>
                        协议转换
                    </button>
                    <button class="tab-btn" data-tab="interface-test">
                        <span class="material-icons-round">science</span>
                        接口测试
                    </button>
                    <button class="tab-btn" data-tab="affinity-test">
                        <span class="material-icons-round">psychology</span>
                        AI 亲和性
                    </button>
                </nav>

                <div class="tab-content-area" id="tab-panels">
                    <div class="tab-panel active" id="panel-basic-info"></div>
                    <div class="tab-panel" id="panel-schema"></div>
                    <div class="tab-panel" id="panel-protocol"></div>
                    <div class="tab-panel" id="panel-interface-test"></div>
                    <div class="tab-panel" id="panel-affinity-test"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Publish Check Modal -->
    <div class="modal-overlay hidden" id="publish-modal">
        <div class="modal">
            <div class="modal-header">
                <h3>发布检查</h3>
                <button class="modal-close" id="modal-close"><span class="material-icons-round">close</span></button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom:var(--space-md); color:var(--text-secondary);">请确认以下检查项均已通过后再发布：</p>
                <div class="modal-checklist" id="modal-checklist"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="modal-cancel">取消</button>
                <button class="btn btn-primary" id="modal-confirm" disabled>确认发布</button>
            </div>
        </div>
    </div>

    <!-- Interface Test Case Modal -->
    <div class="modal-overlay hidden" id="interface-case-modal">
        <div class="modal" style="width:600px;">
            <div class="modal-header">
                <h3 id="interface-modal-title">新增接口测试用例</h3>
                <button class="modal-close"
                    onclick="document.getElementById('interface-case-modal').classList.add('hidden')"><span
                        class="material-icons-round">close</span></button>
            </div>
            <div class="modal-body">
                <div class="form-grid">
                    <div class="input-group">
                        <label class="input-label">用例名称 *</label>
                        <input type="text" class="input-control" id="if-case-name" placeholder="请输入用例名称">
                    </div>
                    <div class="form-row">
                        <div class="input-group">
                            <label class="input-label">用例分类 *</label>
                            <select class="input-control" id="if-case-category">
                                <option>功能测试</option>
                                <option>异常测试</option>
                                <option>安全测试</option>
                                <option>性能测试</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label class="input-label">所属测试集 *</label>
                            <select class="input-control" id="if-case-suite">
                                <option>冒烟测试</option>
                                <option>边界测试</option>
                                <option>安全测试</option>
                                <option>国际化测试</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="input-group">
                            <label class="input-label">执行环境 *</label>
                            <select class="input-control" id="if-case-env">
                                <option value="test">Test 环境</option>
                                <option value="prod">Prod 环境</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label class="input-label">预设结果</label>
                            <select class="input-control" id="if-case-status">
                                <option value="PENDING">待执行</option>
                                <option value="PASS">通过</option>
                                <option value="FAIL">失败</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">预期结果 *</label>
                        <textarea class="input-control" id="if-case-expected" rows="2" placeholder="请描述预期结果"></textarea>
                    </div>
                    <div class="input-group">
                        <label class="input-label">请求参数 (JSON)</label>
                        <textarea class="input-control" id="if-case-params" rows="3"
                            placeholder='{"city": "北京"}'></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary"
                    onclick="document.getElementById('interface-case-modal').classList.add('hidden')">取消</button>
                <button class="btn btn-primary"
                    onclick="alert('用例已保存（模拟）'); document.getElementById('interface-case-modal').classList.add('hidden')">保存</button>
            </div>
        </div>
    </div>

    <!-- Affinity Test Case Modal -->
    <div class="modal-overlay hidden" id="affinity-case-modal">
        <div class="modal" style="width:600px;">
            <div class="modal-header">
                <h3 id="affinity-modal-title">新增 AI 亲和性用例</h3>
                <button class="modal-close"
                    onclick="document.getElementById('affinity-case-modal').classList.add('hidden')"><span
                        class="material-icons-round">close</span></button>
            </div>
            <div class="modal-body">
                <div class="form-grid">
                    <div class="input-group">
                        <label class="input-label">用例名称 *</label>
                        <input type="text" class="input-control" id="af-case-name" placeholder="请输入用例名称">
                    </div>
                    <div class="input-group">
                        <label class="input-label">Prompt (提示词) *</label>
                        <textarea class="input-control" id="af-case-prompt" rows="2"
                            placeholder="请输入自然语言指令，如：北京今天天气怎么样？"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="input-group">
                            <label class="input-label">用例分类 *</label>
                            <select class="input-control" id="af-case-category">
                                <option>基础场景</option>
                                <option>复杂场景</option>
                                <option>边界场景</option>
                                <option>负向测试</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label class="input-label">所属测试集 *</label>
                            <select class="input-control" id="af-case-suite">
                                <option>核心用例</option>
                                <option>扩展用例</option>
                                <option>边界用例</option>
                                <option>负向用例</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="input-group">
                            <label class="input-label">期望命中</label>
                            <select class="input-control" id="af-case-hit">
                                <option value="true">是 - 应命中此 MCP</option>
                                <option value="false">否 - 不应命中此 MCP</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label class="input-label">期望最低得分</label>
                            <select class="input-control" id="af-case-score">
                                <option value="4.5">优秀 (≥4.5)</option>
                                <option value="3.5">良好 (≥3.5)</option>
                                <option value="0">无要求</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">预期结果 *</label>
                        <textarea class="input-control" id="af-case-expected" rows="2" placeholder="请描述预期结果"></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary"
                    onclick="document.getElementById('affinity-case-modal').classList.add('hidden')">取消</button>
                <button class="btn btn-primary"
                    onclick="alert('用例已保存（模拟）'); document.getElementById('affinity-case-modal').classList.add('hidden')">保存</button>
            </div>
        </div>
    </div>

    <!-- AI Auto Config Modal -->
    <div class="modal-overlay hidden" id="ai-config-modal">
        <div class="modal" style="width:550px;">
            <div class="modal-header">
                <h3>AI 一键配置</h3>
                <button class="modal-close"
                    onclick="document.getElementById('ai-config-modal').classList.add('hidden')"><span
                        class="material-icons-round">close</span></button>
            </div>
            <div class="modal-body">
                <div class="ai-config-intro">
                    <span class="material-icons-round"
                        style="font-size:32px; color:var(--color-primary);">auto_awesome</span>
                    <p>请使用自然语言描述您的 MCP 工具功能，AI 将自动生成相应的工具名称、分类和描述信息。</p>
                </div>
                <div class="input-group">
                    <label class="input-label">功能描述</label>
                    <textarea class="input-control" id="ai-config-prompt" rows="5"
                        placeholder="例如：这是一个天气查询服务，可以查询全球主要城市的实时天气、未来7天预报，支持按城市名称搜索，返回温度、湿度、风速等信息，还能进行极端天气预警推送..."></textarea>
                    <span class="input-hint">描述越详细，生成的配置越准确</span>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary"
                    onclick="document.getElementById('ai-config-modal').classList.add('hidden')">取消</button>
                <button class="btn btn-primary"
                    onclick="alert('AI 配置生成中...（模拟）\n\n已自动填充工具名称、分类和描述字段。'); document.getElementById('ai-config-modal').classList.add('hidden');">
                    <span class="material-icons-round">auto_fix_high</span> 生成配置
                </button>
            </div>
        </div>
    </div>

    <!-- All Scripts Inline -->
    <script>
        // ============ DATA ============
        const MCP_TOOL = {
            id: "mcp-weather-v1",
            name: "weather-service-mcp",
            nameCN: "天气查询服务",
            nameEN: "Weather Query Service",
            descriptionCN: "提供天气预报和灾害预警服务。支持全球主要城市的实时天气查询、未来7日预报以及极端天气预警推送。",
            descriptionEN: "Provides weather forecast and disaster alert services.",
            version: "1.2.0",
            category1: "数据查询",
            category2: "天气/环境",
            status: "DRAFT",
            team: "AI平台-工具中台",
            source: "API导入",
            checklist: {
                schema: { status: "PASS", message: "Schema 完整性校验通过", detail: "Input/Output 字段结构完整", link: "schema" },
                protocol: { status: "WARN", message: "协议转换配置存在警告", detail: "缺少 404/500 错误码映射", link: "protocol" },
                interfaceTest: { status: "FAIL", message: "接口测试未通过", detail: "最近批量: 13/15 通过 (86.7%)", link: "interface-test" },
                affinityTest: { status: "PASS", message: "AI 亲和性良好", detail: "平均分 4.8/5.0，命中率 96%", link: "affinity-test" }
            },
            owners: [
                { name: "张三", avatar: "张", role: "负责人" },
                { name: "李四", avatar: "李", role: "协作人" }
            ],
            createdAt: "2023-09-15T08:00:00Z",
            lastUpdated: "2023-10-27T10:30:00Z",
            createdBy: "张三",
            stats: { totalCalls: 15420, avgLatency: 120, errorRate: 0.3 }
        };

        // Version history data
        const VERSION_HISTORY = [
            { version: "1.2.0", status: "DRAFT", date: "2023-10-27", isCurrent: true },
            { version: "1.1.0", status: "PUBLISHED", date: "2023-10-15", isCurrent: false },
            { version: "1.0.0", status: "PUBLISHED", date: "2023-09-20", isCurrent: false }
        ];

        const INTERFACE_TEST_CASES = [
            { id: "TC-001", name: "获取北京天气 (正常)", category: "功能测试", testSuite: "冒烟测试", expectedResult: "返回完整天气数据", env: "test", status: "PASS", latency: 98, lastRun: "2分钟前" },
            { id: "TC-002", name: "获取上海天气 (正常)", category: "功能测试", testSuite: "冒烟测试", expectedResult: "返回完整天气数据", env: "test", status: "PASS", latency: 112, lastRun: "2分钟前" },
            { id: "TC-003", name: "缺少必填参数 city", category: "异常测试", testSuite: "边界测试", expectedResult: "返回400错误码", env: "test", status: "FAIL", latency: 45, lastRun: "2分钟前" },
            { id: "TC-004", name: "无效 API Key", category: "安全测试", testSuite: "安全测试", expectedResult: "返回401认证失败", env: "test", status: "FAIL", latency: 30, lastRun: "2分钟前" },
            { id: "TC-005", name: "获取东京天气 (边界)", category: "功能测试", testSuite: "国际化测试", expectedResult: "正确返回非中文城市数据", env: "prod", status: "PASS", latency: 156, lastRun: "5分钟前" }
        ];

        const INTERFACE_TEST_HISTORY = [
            { runId: "RUN-20231027-001", trigger: "手动执行", caseCount: 15, successRate: 86.7, avgLatency: 105, startTime: "2023-10-27 10:25:00", user: "张三" },
            { runId: "RUN-20231026-002", trigger: "发布前校验", caseCount: 15, successRate: 100, avgLatency: 98, startTime: "2023-10-26 16:30:00", user: "System" }
        ];

        const AFFINITY_TEST_CASES = [
            { id: "AC-001", name: "基础天气查询", prompt: "北京今天天气怎么样？", category: "基础场景", testSuite: "核心用例", expectedResult: "正确识别城市和时间参数", hit: true, status: "PASS", score: 5.0, paramFill: 100, callSuccess: true },
            { id: "AC-002", name: "出行建议场景", prompt: "我明天去上海出差，需要带伞吗？", category: "复杂场景", testSuite: "核心用例", expectedResult: "识别城市、时间和需求意图", hit: true, status: "PASS", score: 4.8, paramFill: 100, callSuccess: true },
            { id: "AC-003", name: "多日查询场景", prompt: "帮我查一下未来三天深圳的温度变化趋势", category: "复杂场景", testSuite: "扩展用例", expectedResult: "识别多日查询意图", hit: true, status: "PASS", score: 4.5, paramFill: 80, callSuccess: true },
            { id: "AC-004", name: "无关问题过滤", prompt: "给我讲个笑话", category: "负向测试", testSuite: "负向用例", expectedResult: "不应命中天气MCP", hit: false, status: "PASS", score: 5.0, paramFill: 0, callSuccess: false },
            { id: "AC-005", name: "模糊查询处理", prompt: "天气预报", category: "边界场景", testSuite: "边界用例", expectedResult: "提示缺少城市参数", hit: true, status: "WARN", score: 3.5, paramFill: 50, callSuccess: true }
        ];

        const AFFINITY_TEST_HISTORY = [
            { runId: "AF-20231027-001", llmVersion: "GPT-4-Turbo", caseCount: 20, avgScore: 4.8, hitRate: 96, rounds: 3, startTime: "2023-10-27 10:00:00", user: "张三" }
        ];

        // ============ APP STATE ============
        let appState = {
            mcp: { ...MCP_TOOL },
            currentTab: 'schema'
        };

        // Helper: Check if all checklist items pass
        function isAllChecklistPassed(checklist) {
            return Object.values(checklist).every(item => item.status === 'PASS');
        }

        // ============ OVERVIEW MODULE ============
        function renderOverview(container, mcpData) {
            const getStatusBadge = (status) => {
                const map = {
                    'DRAFT': { class: 'badge-draft', label: '草稿' },
                    'VALIDATING': { class: 'badge-validating', label: '校验中' },
                    'READY': { class: 'badge-ready', label: '可发布' },
                    'PUBLISHED': { class: 'badge-published', label: '已发布' },
                    'OFFLINE': { class: 'badge-offline', label: '已下线' },
                    'PUBLISH_FAILED': { class: 'badge-error', label: '发布失败' }
                };
                return map[status] || map['DRAFT'];
            };

            const statusInfo = getStatusBadge(mcpData.status);

            container.innerHTML = `
            <div class="overview-card-merged card">
                <!-- Header Row: Icon, Name, Version, Status, Version Dropdown -->
                <div class="overview-header-compact">
                    <div class="tool-identity">
                        <div class="tool-icon"><span class="material-icons-round">cloud</span></div>
                        <div>
                            <h1 class="tool-name">${mcpData.nameCN || mcpData.name}</h1>
                            <div class="tool-meta">
                                <span class="version">v${mcpData.version}</span>
                                <span class="badge badge-lg ${statusInfo.class}">${statusInfo.label}</span>
                            </div>
                        </div>
                    </div>
                    <!-- Version Dropdown -->
                    <div class="version-dropdown" id="version-dropdown">
                        <button class="btn btn-secondary version-trigger" id="version-trigger">
                            <span class="material-icons-round">history</span>
                            <span>版本: v${mcpData.version}</span>
                            <span class="material-icons-round">expand_more</span>
                        </button>
                        <div class="version-menu hidden" id="version-menu">
                            ${VERSION_HISTORY.map(v => `
                                <div class="version-option ${v.isCurrent ? 'current' : ''}" data-version="${v.version}">
                                    <div class="version-info">
                                        <span class="version-num">v${v.version}</span>
                                        <span class="badge ${v.status === 'PUBLISHED' ? 'badge-published' : 'badge-draft'}">${v.status === 'PUBLISHED' ? '已发布' : '草稿'}</span>
                                    </div>
                                    <span class="version-date">${v.date}</span>
                                    ${v.status === 'DRAFT' && !v.isCurrent ? `<button class="version-delete" data-version="${v.version}" title="删除此版本"><span class="material-icons-round">delete</span></button>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
                
                <!-- Governance Info (Inline Compact) -->
                <div class="governance-inline">
                    <div class="gov-row">
                        <div class="gov-item-inline">
                            <span class="gov-label">负责人/协作人</span>
                            <div class="owner-list-inline" id="owner-list">
                                ${mcpData.owners.map((o, idx) => `
                                    <div class="owner-chip-compact editable" data-idx="${idx}">
                                        <div class="avatar" style="background:${o.role === '负责人' ? 'var(--color-primary)' : 'var(--color-border-hover)'}; color:white;">${o.avatar}</div>
                                        <span class="owner-name-compact">${o.name}</span>
                                        <button class="chip-remove-compact" data-idx="${idx}" title="移除">
                                            <span class="material-icons-round">close</span>

        // ============ PUBLISH MODAL ============
        function showPublishModal() {
            const modal = document.getElementById('publish-modal');
            const checklistContainer = document.getElementById('modal-checklist');
            const confirmBtn = document.getElementById('modal-confirm');

            // Render first 4 checklist items (no manual review)
            const checklist = appState.mcp.checklist;
            const items = [
                { key: 'schema', label: 'Schema 完整性' },
                { key: 'protocol', label: '协议转换配置' },
                { key: 'interfaceTest', label: '接口测试' },
                { key: 'affinityTest', label: 'AI 亲和性' }
            ];

            const iconMap = {
                'PASS': { icon: 'check_circle', class: 'pass' },
                'FAIL': { icon: 'cancel', class: 'fail' },
                'WARN': { icon: 'warning', class: 'warn' },
                'PENDING': { icon: 'schedule', class: 'pending' }
            };

            checklistContainer.innerHTML = items.map(item => {
                const check = checklist[item.key];
                const st = iconMap[check.status] || iconMap['PENDING'];
                return `
                <div class="modal-check-item">
                    <span class="material-icons-round status-icon ${st.class}">${st.icon}</span>
                    <div class="check-info">
                        <div class="check-label">${item.label}</div>
                        <div class="check-detail">${check.message}</div>
                    </div>
                </div>
            `;
            }).join('');

            // Check if all 4 items pass
            const allPass = items.every(item => checklist[item.key].status === 'PASS');
            confirmBtn.disabled = !allPass;

            modal.classList.remove('hidden');
        }

                container.querySelectorAll('.sub-tab').forEach(tab => tab.addEventListener('click', () => { currentSubTab = tab.dataset.subtab; render(); }));
                const batchBtn = container.querySelector('#btn-start-batch');
                if (batchBtn) { batchBtn.addEventListener('click', () => { const p = container.querySelector('#batch-progress'); const f = p.querySelector('.progress-bar-fill'); p.style.display = 'block'; let w = 0; const i = setInterval(() => { w += 20; f.style.width = w + '%'; if (w >= 100) { clearInterval(i); setTimeout(() => { alert('完成！'); render(); }, 500); } }, 300); }); }
                const addBtn = container.querySelector('#btn-add-interface-case');
                if (addBtn) { addBtn.addEventListener('click', () => { document.getElementById('interface-modal-title').textContent = '新增用例'; document.getElementById('if-case-name').value = ''; document.getElementById('interface-case-modal').classList.remove('hidden'); }); }
                const saveBtn = container.querySelector('#btn-save-as-case');
                if (saveBtn) { saveBtn.addEventListener('click', () => { document.getElementById('interface-modal-title').textContent = '保存为用例'; document.getElementById('if-case-name').value = '调试用例'; document.getElementById('interface-case-modal').classList.remove('hidden'); }); }
            };
            render();
        }

        // ============ AFFINITY TEST MODULE ============
        function renderAffinityTest(container) {
            let currentSubTab = 'cases';

            const render = () => {
                let panelContent = '';
                if (currentSubTab === 'cases') {
                    const selectedCase = AFFINITY_TEST_CASES[0];
                    panelContent = `
                    <div class="merged-test-panel">
                        <div class="debug-section card">
                            <div class="debug-header"><h4><span class="material-icons-round">chat</span> 单次调试</h4><button class="btn btn-secondary btn-sm" id="btn-save-affinity-case"><span class="material-icons-round">save</span> 保存为用例</button></div>
                            <div class="affinity-debug-row">
                                <div class="prompt-input-compact">
                                    <textarea class="input-control" placeholder="输入自然语言指令，如：帮我查一下明天上海的天气预报" rows="2"></textarea>
                                    <div class="debug-actions-inline">
                                        <select class="input-control" style="width:140px;"><option>GPT-4-Turbo</option><option>Claude-3</option></select>
                                        <button class="btn btn-primary"><span class="material-icons-round">send</span> 测试</button>
                                    </div>
                                </div>
                                <div class="affinity-result-compact">
                                    <div class="result-row"><span class="label">命中:</span><span class="badge badge-ready">是</span></div>
                                    <div class="result-row"><span class="label">评分:</span><span class="score-badge good">4.5</span></div>
                                    <div class="result-row"><span class="label">输出:</span><code>{"city":"上海"}</code></div>
                                </div>
                            </div>
                        </div>
                        <div class="cases-section">
                            <div class="toolbar"><div class="toolbar-left"><input type="text" class="input-control" placeholder="搜索..." style="width:120px;"><select class="input-control" style="width:90px;"><option value="">分类</option><option>基础</option><option>复杂</option></select></div><div class="toolbar-right"><button class="btn btn-secondary btn-sm"><span class="material-icons-round">upload_file</span></button><button class="btn btn-primary btn-sm" id="btn-add-affinity-case"><span class="material-icons-round">add</span> 新增</button></div></div>
                            <div class="card" style="padding:0; overflow:hidden;"><table class="data-table selectable"><thead><tr><th style="width:40px;"><input type="checkbox"></th><th>ID</th><th>用例名称</th><th>分类</th><th>命中</th><th>得分</th></tr></thead><tbody>${AFFINITY_TEST_CASES.map((c, i) => `<tr class="case-row ${i === 0 ? 'selected' : ''}"><td><input type="checkbox"></td><td><code>${c.id}</code></td><td>${c.name}</td><td><span class="badge badge-draft">${c.category}</span></td><td>${c.hit ? '<span class="badge badge-ready">是</span>' : '<span class="badge badge-offline">否</span>'}</td><td><span class="score-badge ${c.score >= 4.5 ? 'good' : c.score >= 3.5 ? 'warn' : 'bad'}">${c.score}</span></td></tr>`).join('')}</tbody></table></div>
                        </div>
                    </div>`;
                } else if (currentSubTab === 'batch') {
                    panelContent = `
                    <div class="batch-panel-merged">
                        <div class="batch-config card"><h4>批量评测配置</h4><div class="config-grid"><div class="input-group"><label class="input-label">用例集</label><select class="input-control"><option>全部 (${AFFINITY_TEST_CASES.length})</option></select></div><div class="input-group"><label class="input-label">LLM</label><select class="input-control"><option>GPT-4-Turbo</option><option>Claude-3</option></select></div></div><div class="batch-actions"><button class="btn btn-primary"><span class="material-icons-round">psychology</span> 开始评测</button></div></div>
                        <div class="stats-preview"><div class="stat-card card"><div class="stat-label">平均分</div><div class="stat-value primary">4.8</div></div><div class="stat-card card"><div class="stat-label">命中率</div><div class="stat-value success">96%</div></div></div>
                        <div class="history-section"><h4>历史记录</h4><div class="card" style="padding:0; overflow:hidden;"><table class="data-table"><thead><tr><th>ID</th><th>LLM</th><th>用例数</th><th>平均分</th><th>时间</th></tr></thead><tbody>${AFFINITY_TEST_HISTORY.map(h => `<tr><td><code>${h.runId}</code></td><td>${h.llmVersion}</td><td>${h.caseCount}</td><td><span class="score-badge good">${h.avgScore}</span></td><td>${h.startTime}</td></tr>`).join('')}</tbody></table></div></div>
                    </div>`;
                }
                container.innerHTML = `<div class="module-container"><div class="sub-tabs"><button class="sub-tab ${currentSubTab === 'cases' ? 'active' : ''}" data-subtab="cases"><span class="material-icons-round">list_alt</span> 测试用例</button><button class="sub-tab ${currentSubTab === 'batch' ? 'active' : ''}" data-subtab="batch"><span class="material-icons-round">psychology</span> 批量测试</button></div><div class="sub-panel">${panelContent}</div></div>`;
                container.querySelectorAll('.sub-tab').forEach(tab => tab.addEventListener('click', () => { currentSubTab = tab.dataset.subtab; render(); }));
                const addBtn = container.querySelector('#btn-add-affinity-case');
                if (addBtn) { addBtn.addEventListener('click', () => { document.getElementById('affinity-modal-title').textContent = '新增用例'; document.getElementById('af-case-name').value = ''; document.getElementById('affinity-case-modal').classList.remove('hidden'); }); }
                const saveBtn = container.querySelector('#btn-save-affinity-case');
                if (saveBtn) { saveBtn.addEventListener('click', () => { document.getElementById('affinity-modal-title').textContent = '保存为用例'; document.getElementById('af-case-name').value = '调试用例'; document.getElementById('affinity-case-modal').classList.remove('hidden'); }); }
            };
            render();
        }

        // ============ APP INIT ============
        document.addEventListener('DOMContentLoaded', () => {
            // Render Overview
            renderOverview(document.getElementById('overview-area'), appState.mcp);

            // Render default tab (Basic Info)
            renderBasicInfo(document.getElementById('panel-basic-info'), appState.mcp);

            // Tab switching
            document.querySelectorAll('.tab-btn').forEach(tab => {
                tab.addEventListener('click', () => {
                    const target = tab.dataset.tab;

                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));

                    tab.classList.add('active');
                    document.getElementById(`panel-${target}`).classList.add('active');

                    const panel = document.getElementById(`panel-${target}`);
                    if (panel.childElementCount === 0) {
                        switch (target) {
                            case 'basic-info': renderBasicInfo(panel, appState.mcp); break;
                            case 'schema': renderSchema(panel); break;
                            case 'protocol': renderProtocol(panel); break;
                            case 'interface-test': renderInterfaceTest(panel); break;
                            case 'affinity-test': renderAffinityTest(panel); break;
                        }
                    }
                });
            });
        });
    </script>
</body>

</html>
